<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Microblogging - Jacob Kopczynski</title>
  <style>
    body {
      font-family: Georgia, serif;
      max-width: 40em;
      margin: 0 auto;
      padding: 2em 1em;
      line-height: 1.6;
      color: #e0dbd4;
      background-color: #1c1917;
      background-image: url("data:image/svg+xml,%3Csvg width='6' height='6' viewBox='0 0 6 6' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23504840' fill-opacity='0.6' fill-rule='evenodd'%3E%3Cpath d='M5 0h1L0 6V5zM6 5v1H5z'/%3E%3C/g%3E%3C/svg%3E");
    }
    h1 {
      color: #ece8e2;
      border-bottom: 2px solid #d07020;
      padding-bottom: 0.3em;
    }
    h2 { color: #ece8e2; }
    a { color: #e88040; }
    a:visited { color: #c06830; }
    a:hover { color: #f0a060; }
    nav { margin-bottom: 2em; }
    .date { color: #908880; font-style: italic; font-size: 0.9em; }
    article {
      margin-bottom: 3em;
      border-bottom: 1px solid #3a3530;
      padding-bottom: 2em;
    }
    article:last-of-type { border-bottom: none; }
    pre { display: inline; }
    blockquote {
      border-left: 3px solid #d07020;
      margin-left: 0;
      padding-left: 1em;
      color: #b0a898;
    }
  </style>
</head>
<body>
  <nav><a href="/">&larr; Home</a></nav>
  <h1>Longer-Form Blogging</h1>
  I've started a Substack, <a href="https://dangeroussincerity.substack.com/">Dangerous
      Sincerity</a>, for various original thoughts.
  <h1>Micro-Posts</h1>
  <div id="posts"></div>

  <script>
    const postFiles = [
      "2024-10-02-break-things.html",
      "2024-07-21-planning-meetings-on-fridays.html",
      "2021-10-04-disk-encryption.html",
      "2021-05-03-dynamic-programming.html",
      "2021-04-25-rails.html"
    ];

    const container = document.getElementById("posts");

    (async () => {
      for (const file of postFiles) {
        const resp = await fetch(file);
        const html = await resp.text();
        const article = document.createElement("article");
        article.innerHTML = html;
        container.appendChild(article);
      }
    })();
  </script>
</body>
</html>
